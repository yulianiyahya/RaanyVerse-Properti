<ion-header class="ion-no-border">
  <div class="pesanan-header">
    <div class="header-left">
      <span class="header-title">Pemesanan Saya</span>
    </div>
    <div class="header-right" (click)="goToNotifikasi()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
    </div>
  </div>
</ion-header>

<ion-content class="pesanan-content" scrollY="true">

  <!-- Filter Tab -->
  <div class="filter-scroll">
    <div
      class="filter-chip"
      *ngFor="let f of filterList"
      [class.active]="filterAktif === f.value"
      (click)="filterAktif = f.value"
    >
      {{ f.label }}
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-wrapper" *ngIf="getFiltered().length === 0">
    <div class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24"
        fill="none" stroke="#C4B8AE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      <p class="empty-title">Belum ada pesanan</p>
      <p class="empty-sub">Pilih unit dan tekan "Pesan Sekarang" untuk memulai</p>
      <button class="btn-cari" (click)="goToUnit()">Cari Unit</button>
    </div>
  </div>

  <!-- Pesanan List -->
  <div class="pesanan-list" *ngIf="getFiltered().length > 0">

    <!-- Pesanan Card -->
    <div class="pesanan-card" *ngFor="let p of getFiltered()">

      <div class="card-left">
        <img [src]="p.gambar" [alt]="p.nama" class="card-img" />
      </div>

      <div class="card-body">
        <div class="card-top">
          <h3 class="card-nama">{{ p.nama }}</h3>
          <span class="badge" [ngClass]="{
            'badge-menunggu': p.status === 'menunggu',
            'badge-disetujui': p.status === 'disetujui',
            'badge-ditolak': p.status === 'ditolak'
          }">{{ getStatusLabel(p.status) }}</span>
        </div>

        <p class="card-tanggal">{{ p.tanggal }}</p>
        <p class="card-lokasi">{{ p.lokasi }}</p>
        <p class="card-harga">Rp {{ p.harga | number:'1.0-0' }}</p>

        <div class="card-actions">
          <button
            *ngIf="p.status === 'menunggu'"
            class="btn-batal"
            (click)="batalPesanan(p.id)"
          >
            Batalkan
          </button>
          <span *ngIf="p.status === 'disetujui'" class="info-disetujui">✓ Pesanan diterima</span>
          <span *ngIf="p.status === 'ditolak'" class="info-ditolak">✗ Pesanan ditolak</span>
        </div>
      </div>

    </div>
  </div>

</ion-content>

<!-- Bottom Navigation -->
<ion-footer class="ion-no-border">
  <div class="bottom-nav">
    <div class="nav-item" (click)="goToBeranda()">
      <div class="nav-icon-wrap">
        <ion-icon name="home-outline"></ion-icon>
      </div>
      <span>Beranda</span>
    </div>
    <div class="nav-item" (click)="goToUnit()">
      <div class="nav-icon-wrap">
        <ion-icon name="business-outline"></ion-icon>
      </div>
      <span>Unit</span>
    </div>
    <div class="nav-item active">
      <div class="nav-icon-wrap active">
        <ion-icon name="receipt-outline"></ion-icon>
      </div>
      <span>Pesanan</span>
    </div>
    <div class="nav-item" (click)="goToProfil()">
      <div class="nav-icon-wrap">
        <ion-icon name="person-outline"></ion-icon>
      </div>
      <span>Profil</span>
    </div>
  </div>
</ion-footer>
