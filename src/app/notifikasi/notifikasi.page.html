<ion-header class="ion-no-border">
  <div class="notif-header">
    <div class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      <span>Kembali</span>
    </div>
    <span class="header-title">Notifikasi</span>
    <div class="header-placeholder"></div>
  </div>
</ion-header>

<ion-content class="notif-content" scrollY="true">

  <!-- Filter Tab -->
  <div class="filter-tab">
    <span class="tab-item" [class.active]="filterAktif === 'semua'" (click)="filterAktif = 'semua'">Semua</span>
    <span class="tab-item" [class.active]="filterAktif === 'belum'" (click)="filterAktif = 'belum'">Belum Dibaca</span>
  </div>

    <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading" style="text-align:center;padding:40px">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p style="color:#aaa;margin-top:12px">Memuat notifikasi...</p>
  </div>

  <!-- List Notifikasi -->
  <div class="notif-list" *ngIf="getFilteredNotif().length > 0">
    <div
      class="notif-item"
      *ngFor="let item of getFilteredNotif()"
      [class.unread]="!item.dibaca"
      (click)="bacaNotif(item)"
    >
      <div class="notif-icon" [ngClass]="item.tipe">
        <svg *ngIf="item.tipe === 'tagihan'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
        <svg *ngIf="item.tipe === 'info'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <svg *ngIf="item.tipe === 'sukses'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="notif-info">
        <p class="notif-title">{{ item.judul }}</p>
        <p class="notif-desc">{{ item.deskripsi }}</p>
        <p class="notif-time">{{ item.waktu }}</p>
      </div>
      <div class="unread-dot" *ngIf="!item.dibaca"></div>
    </div>
  </div>

  <!-- FIX: wrapper full-height agar empty state bisa di-center -->
  <div class="empty-wrapper" *ngIf="getFilteredNotif().length === 0">
    <div class="empty-notif">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#C4B8AE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <p>Tidak ada notifikasi</p>
    </div>
  </div>

</ion-content>
