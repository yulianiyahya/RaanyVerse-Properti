<ion-content>
  <div class="rp-container">

    <!-- Logo -->
    <div class="rp-logo">
      <img src="assets/icon/Logo raanyprop.png" alt="RaanyProp" class="logo-img" />
      <h1 class="rp-brand">RaanyProp</h1>
      <p class="rp-by">by RaanyVerse</p>
    </div>

    <h2 class="rp-title">Buat Kata Sandi Baru</h2>
    <p class="rp-desc">Kata sandi baru harus berbeda dari sebelumnya.</p>

    <!-- Password Baru -->
    <div class="input-group">
      <div class="input-wrapper">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <input
          [type]="showPw1 ? 'text' : 'password'"
          placeholder="Kata sandi baru"
          [(ngModel)]="password" />
        <ion-icon
          [name]="showPw1 ? 'eye-off-outline' : 'eye-outline'"
          class="toggle-eye"
          (click)="showPw1 = !showPw1">
        </ion-icon>
      </div>
    </div>

    <!-- Konfirmasi Password -->
    <div class="input-group">
      <div class="input-wrapper">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <input
          [type]="showPw2 ? 'text' : 'password'"
          placeholder="Konfirmasi kata sandi"
          [(ngModel)]="confirmPassword" />
        <ion-icon
          [name]="showPw2 ? 'eye-off-outline' : 'eye-outline'"
          class="toggle-eye"
          (click)="showPw2 = !showPw2">
        </ion-icon>
      </div>
    </div>

    <button class="btn-save" (click)="resetPassword()">Simpan Kata Sandi Baru</button>

    <p class="rp-version">v1.0 · RaanyVerse</p>
  </div>
</ion-content>
