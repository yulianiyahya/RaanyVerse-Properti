<ion-content>
  <div class="rp-container">

    <!-- Logo -->
    <div class="rp-logo">
      <img src="assets/icon/Logo raanyprop.png" alt="RaanyProp" class="logo-box" style="width:100px;height:100px;border-radius:20px;object-fit:cover;" />
      <h1 class="rp-brand">RaanyProp</h1>
      <p class="rp-by">by RaanyVerse</p>
    </div>

    <h2 class="rp-title">Verifikasi Email</h2>
    <p class="rp-desc">Kode 6 digit telah dikirim ke <b>{{ email }}</b></p>

    <!-- OTP Input -->
    <div class="otp-row">
      <input
        *ngFor="let i of [0,1,2,3,4,5]"
        class="otp-box"
        type="tel"
        maxlength="1"
        [(ngModel)]="otpDigits[i]"
        (input)="onOtpInput($event, i)"
        (keydown)="onKeyDown($event, i)"
        #otpInput />
    </div>

    <p class="resend-text">
      Tidak menerima kode?
      <span class="resend-link" (click)="resend()" [class.disabled]="timerActive || isLoading">
        Kirim ulang {{ timerActive ? '(' + timer + 's)' : '' }}
      </span>
    </p>

    <button class="btn-verify" (click)="verifyOtp()" [disabled]="isLoading">
      <ion-spinner name="crescent" *ngIf="isLoading" style="margin-right: 8px; width: 20px; height: 20px;"></ion-spinner>
      {{ isLoading ? 'Memproses...' : 'Verifikasi' }}
    </button>
    <button class="btn-ghost" (click)="goBack()" [disabled]="isLoading">Kembali</button>

    <p class="rp-version">v1.0 · RaanyVerse</p>
  </div>
</ion-content>
