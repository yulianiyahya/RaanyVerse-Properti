<ion-content>
  <div class="rp-container">

    <!-- Logo -->
    <div class="rp-logo">
      <img src="assets/icon/Logo raanyprop.png" alt="RaanyProp" class="logo-box" style="width:100px;height:100px;border-radius:20px;object-fit:cover;" />
      <h1 class="rp-brand">RaanyProp</h1>
      <p class="rp-by">by RaanyVerse</p>
    </div>

    <!-- Judul -->
    <h2 class="rp-title">Lupa Kata Sandi?</h2>
    <p class="rp-desc">
      Masukkan email yang terdaftar. Kami akan mengirimkan
      kode verifikasi ke email kamu.
    </p>

    <!-- Form -->
    <ion-list lines="none">
      <ion-item class="rp-field">
        <ion-icon name="mail-outline" slot="start" class="field-icon"></ion-icon>
        <ion-input
          type="email"
          placeholder="contoh@email.com"
          [(ngModel)]="email"
          clearInput>
        </ion-input>
      </ion-item>
    </ion-list>

    <!-- Tombol -->
    <ion-button expand="block" class="rp-btn" (click)="sendOtp()" [disabled]="isLoading">
      <ion-spinner name="crescent" *ngIf="isLoading" style="margin-right: 8px; width: 20px; height: 20px;"></ion-spinner>
      {{ isLoading ? 'Memproses...' : 'Kirim Kode Verifikasi' }}
    </ion-button>

    <ion-button expand="block" fill="outline" class="rp-btn-ghost" routerLink="/login" [disabled]="isLoading">
      Kembali ke Masuk
    </ion-button>

    <p class="rp-version">v1.0 · RaanyVerse</p>

  </div>
</ion-content>
